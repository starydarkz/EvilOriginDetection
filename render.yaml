# render.yaml — Evil Origin Detection deployment config for Render.com
services:
  - type: web
    name: evil-origin-detection
    runtime: python
    plan: free

    buildCommand: pip install -r requirements.txt
    startCommand: python -m gunicorn main:app -k uvicorn.workers.UvicornWorker --workers 1 --bind 0.0.0.0:$PORT --timeout 120 --keep-alive 5

    healthCheckPath: /
    autoDeploy: true

    envVars:
      - key: CACHE_TTL_HOURS
        value: "24"
      - key: LOG_LEVEL
        value: "INFO"
      - key: DB_PATH
        value: "/tmp/eod.db"
      - key: LOG_PATH
        value: "/tmp/eod.log"
      - key: URLQUERY_KEY
        sync: false
      - key: VT_KEY_1
        sync: false
      - key: VT_KEY_2
        sync: false
      - key: ABUSEIPDB_KEY_1
        sync: false
      - key: ABUSEIPDB_KEY_2
        sync: false
      - key: SHODAN_KEY_1
        sync: false
      - key: SHODAN_KEY_2
        sync: false
      - key: PULSEDIVE_KEY_1
        sync: false
      - key: PULSEDIVE_KEY_2
        sync: false
      - key: CRIMINALIP_KEY_1
        sync: false
      - key: CRIMINALIP_KEY_2
        sync: false
      - key: URLSCAN_KEY_1
        sync: false
      - key: URLSCAN_KEY_2
        sync: false
      - key: SECURITYTRAILS_KEY_1
        sync: false
      - key: SECURITYTRAILS_KEY_2
        sync: false
