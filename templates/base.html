<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Evil Origin Detection{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/themes.css">
  <link rel="stylesheet" href="/static/css/main.css">
  {% block head %}{% endblock %}
</head>
<body class="dark">

<!-- Cosmos canvas (dark mode) -->
<canvas id="cosmos-bg" aria-hidden="true"></canvas>
<!-- Forensic grid (light mode) -->
<div id="forensic-grid" aria-hidden="true"></div>

<!-- TOP NAV -->
<nav class="topnav">
  <a href="/" class="topnav-brand">
    <svg class="brand-icon" viewBox="0 0 22 22" fill="none">
      <path class="icon-horn-l" d="M7 10 C5 7,3 4,5 2 C6 4,7 7,8 9Z"/>
      <path class="icon-horn-r" d="M15 10 C17 7,19 4,17 2 C16 4,15 7,14 9Z"/>
      <path class="icon-eye" d="M3 11 C6 6.5,9 5,11 5 C13 5,16 6.5,19 11 C16 15.5,13 17,11 17 C9 17,6 15.5,3 11Z" stroke-width="0.8"/>
      <circle class="icon-iris" cx="11" cy="11" r="3.5" stroke-width="0.7"/>
      <ellipse class="icon-pupil" cx="11" cy="11" rx="1.2" ry="2.5"/>
    </svg>
    <span class="brand-name"><span class="brand-evil">Evil</span> Origin Detection</span>
  </a>

  <div class="topnav-right">
    <!-- Theme switcher -->
    <div class="theme-switcher" role="group" aria-label="Color theme">
      <button class="theme-btn theme-dark active" id="btn-dark"
              onclick="setTheme('dark')" title="Dark — Cosmos">☽</button>
      <button class="theme-btn theme-light" id="btn-light"
              onclick="setTheme('light')" title="Light — Forensic">◎</button>
    </div>

    <!-- GitHub -->

    <a class="gh-link" href="https://github.com/starydarkz/EvilOriginDetection"
       target="_blank" rel="noopener noreferrer" title="Contribute on GitHub">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.2 11.38.6.11.82-.26.82-.58v-2.03c-3.34.72-4.04-1.61-4.04-1.61-.55-1.39-1.34-1.76-1.34-1.76-1.09-.74.08-.73.08-.73 1.2.08 1.84 1.24 1.84 1.24 1.07 1.83 2.8 1.3 3.49 1 .1-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.14-.3-.54-1.52.1-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 0 1 3-.4c1.02 0 2.04.13 3 .4 2.28-1.55 3.29-1.23 3.29-1.23.65 1.66.24 2.88.12 3.18.77.84 1.23 1.91 1.23 3.22 0 4.61-2.8 5.63-5.48 5.92.43.37.81 1.1.81 2.22v3.29c0 .32.22.7.83.58C20.57 21.8 24 17.3 24 12c0-6.63-5.37-12-12-12z"/>
      </svg>
      Contribute
    </a>
  </div>
</nav>

<!-- PAGE CONTENT -->
<main id="main-content">
  {% block content %}{% endblock %}
</main>

<!-- FOOTER -->
<footer class="site-footer">
  <span>Evil Origin Detection</span>
  <span class="footer-sep">·</span>
  <span>Open Source Threat Intelligence</span>
  <span class="footer-sep">·</span>
  <a href="https://github.com/starydarkz/EvilOriginDetection" target="_blank" rel="noopener">
    github.com/starydarkz/EvilOriginDetection
  </a>
</footer>

<script src="/static/js/theme.js"></script>
<script src="/static/js/cosmos.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
